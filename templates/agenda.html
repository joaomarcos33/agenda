{% extends "base.html" %}

{% block content %}
    <form method="POST">
        <input type="text"
               name="titulo-tarefa"
               placeholder="Título da tarefa"
               required>

        <input type="date"
               name="data-conclusao">

        <button type="submit">Adicionar</button>
    </form>

    {% for tarefa in tarefas %}
        <p class="tarefa">
            {{ tarefa.titulo_tarefa }} - {{ tarefa.data_conclusao }}
        </p>
    {% endfor %}
{% endblock %}
